<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Runners Blog</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="navbar-logo">
      <div class="logo-icon">🏃</div>
      <span class="logo-text">RUNNERS<span>BLOG</span></span>
    </a>
    <div class="navbar-nav">
      <a href="index.html" class="nav-link">Home</a>
      <a href="blog.html" class="nav-link">Blog</a>
      <a href="about.html" class="nav-link">About</a>
    </div>
    <div class="navbar-actions">
      <div id="guestActions" class="d-flex gap-2 align-center">
        <a href="login.html" class="btn btn-ghost btn-sm">Log In</a>
        <a href="register.html" class="btn btn-primary btn-sm">Join Free</a>
      </div>
      <div id="userActions" class="d-flex gap-2 align-center hidden">
        <a href="create-post.html" id="writeBtnNav" class="btn btn-primary btn-sm">✏️ Write</a>
        <div class="nav-user-menu">
          <div class="nav-avatar" id="navAvatar"><span id="userAvatarText">U</span></div>
          <div class="dropdown-menu" id="userDropdown">
            <a href="dashboard.html" class="dropdown-item">👤 My Profile</a>
            <div class="dropdown-divider"></div>
            <div class="dropdown-item danger" id="logoutBtn">🚪 Log Out</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<!-- AUTH PAGE -->
<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <!-- Logo -->
      <div class="auth-logo">
        <div style="width:56px;height:56px;background:var(--primary);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.8rem;margin:0 auto 16px;">🏃</div>
        <h1 class="auth-title display-font">Welcome Back</h1>
        <p class="auth-subtitle">Log in to continue your running journey</p>
      </div>

      <!-- Demo credentials hint -->
      <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:var(--radius);padding:12px 16px;margin-bottom:24px;font-size:0.825rem;color:#92400e;">
        <strong>Demo:</strong> admin@runnersblog.com / password123
      </div>

      <!-- Error message -->
      <div id="errorMsg" class="hidden" style="background:#fee2e2;border:1px solid #fca5a5;border-radius:var(--radius);padding:12px 16px;margin-bottom:20px;font-size:0.875rem;color:#991b1b;"></div>

      <!-- Form -->
      <form id="loginForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email">
          <div class="form-error hidden" id="emailError"></div>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">
            Password
            <a href="#" style="float:right;font-weight:400;color:var(--primary);font-size:0.8rem;">Forgot password?</a>
          </label>
          <div style="position:relative;">
            <input type="password" class="form-control" id="password" placeholder="Your password" required autocomplete="current-password">
            <button type="button" id="togglePwd" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1rem;color:var(--text-light);">👁</button>
          </div>
          <div class="form-error hidden" id="passwordError"></div>
        </div>

        <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
          <input type="checkbox" id="remember" style="width:16px;height:16px;accent-color:var(--primary);">
          <label for="remember" style="font-size:0.875rem;color:var(--text-mid);">Remember me</label>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg" id="submitBtn">
          Log In →
        </button>
      </form>

      <p style="text-align:center;margin-top:24px;font-size:0.875rem;color:var(--text-light);">
        Don't have an account? <a href="register.html" style="color:var(--primary);font-weight:600;">Join free</a>
      </p>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
// Redirect if already logged in
document.addEventListener('DOMContentLoaded', async () => {
  const user = await auth.init();
  if (user) {
    window.location.href = 'dashboard.html';
  }
});

// Toggle password visibility
document.getElementById('togglePwd').addEventListener('click', () => {
  const pwd = document.getElementById('password');
  const btn = document.getElementById('togglePwd');
  if (pwd.type === 'password') {
    pwd.type = 'text';
    btn.textContent = '🙈';
  } else {
    pwd.type = 'password';
    btn.textContent = '👁';
  }
});

// Form submit
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');

  // Basic validation
  let valid = true;

  if (!email) {
    document.getElementById('emailError').textContent = 'Email is required';
    document.getElementById('emailError').classList.remove('hidden');
    valid = false;
  } else {
    document.getElementById('emailError').classList.add('hidden');
  }

  if (!password) {
    document.getElementById('passwordError').textContent = 'Password is required';
    document.getElementById('passwordError').classList.remove('hidden');
    valid = false;
  } else {
    document.getElementById('passwordError').classList.add('hidden');
  }

  if (!valid) return;

  // Submit
  submitBtn.disabled = true;
  submitBtn.textContent = 'Logging in...';
  errorMsg.classList.add('hidden');

  const result = await auth.login(email, password);

  if (result.ok) {
    showToast('Welcome back! 🏃', 'success');
    setTimeout(() => {
      const redirect = new URLSearchParams(window.location.search).get('redirect') || 'dashboard.html';
      window.location.href = redirect;
    }, 600);
  } else {
    errorMsg.textContent = result.data.message || 'Login failed. Please try again.';
    errorMsg.classList.remove('hidden');
    submitBtn.disabled = false;
    submitBtn.textContent = 'Log In →';
  }
});
</script>
</body>
</html>
